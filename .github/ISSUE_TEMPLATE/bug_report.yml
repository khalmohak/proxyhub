name: Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below as completely as possible — the more detail you provide, the faster we can fix it.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this hasn't been reported before
          required: true
        - label: I am running the latest version from `main`
          required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click 'Sync Metadata', the progress panel never appears even though the sync completes..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps to trigger the bug.
      placeholder: |
        1. Go to Proxies page
        2. Click 'Sync Metadata'
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: The progress panel should slide up and show live results.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in what's relevant.
      value: |
        - OS:
        - Docker version:
        - Node.js version (if running locally):
        - Browser (if UI issue):
        - ProxyHub version / commit:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant output from `docker compose logs backend` or browser console.
      render: shell
