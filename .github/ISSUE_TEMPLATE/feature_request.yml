name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great — share it below. Please search existing issues first to avoid duplicates.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this hasn't been requested before
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you're running into.
      placeholder: "It's hard to tell which proxies are being used most from the proxies table alone..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as possible.
      placeholder: "Add a usage bar or sparkline to each row in the proxy table..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you could work around this today.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Dashboard UI
        - Proxy management
        - Device management
        - Logging & export
        - Auth & security
        - Background sync
        - API
        - Docker / deployment
        - Documentation
        - Other
